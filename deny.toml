# Documentation for this configuration file can be found here
# https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
]

# https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html
[licenses]
allow = [
    "AGPL-3.0-only",
    "Apache-2.0 WITH LLVM-exception",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "Zlib",
    "Unicode-3.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

# https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html
[bans]
multiple-versions = "deny"
wildcards = "allow"
deny = []
skip = [
    # wasmtime-wasi uses witx which requires thiserror 1.x and wast 35.x
    { name = "thiserror", version = "1" },
    { name = "thiserror-impl", version = "1" },
    { name = "wast", version = "35" },
    # val-json uses wast 248 for test parsing; wat 1.249 (via wasm-compose) uses wast 249
    { name = "wast", version = "248" },
    # wasmtime-internal-cache uses toml 0.9 and its transitive deps
    { name = "toml", version = "0.9" },
    { name = "toml_datetime", version = "0.7" },
    { name = "winnow", version = "0.7" },
    { name = "getrandom", version = "0.2" },
    # rand 0.9 uses getrandom 0.3; we directly depend on getrandom 0.4
    { name = "getrandom", version = "0.3" },
    # obelisk uses rand 0.9; postgres-protocol requires rand 0.10
    { name = "rand", version = "0.9" },
    { name = "rand_core", version = "0.9" },
    # wasmtime uses wasm-compose which requires petgraph 0.6
    { name = "petgraph", version = "0.6" },
    { name = "fixedbitset", version = "0.4" },
    # hashbrown 0.14.5 used by boa_engine
    { name = "hashbrown", version = "0.14" },
    # hashbrown 0.15 is used by prost-build, regalloc2 (wasmtime), wasmparser 0.244
    { name = "hashbrown", version = "0.15" },
    { name = "hashbrown", version = "0.16.1" },
    { name = "foldhash", version = "0.1" },
    # obelisk uses sha2 0.10 RustCrypto suite; postgres-protocol requires sha2 0.11
    { name = "sha2", version = "0.10" },
    { name = "digest", version = "0.10" },
    { name = "block-buffer", version = "0.10" },
    { name = "crypto-common", version = "0.1" },
    { name = "cpufeatures", version = "0.2" },
    # oci-wasm uses wit-component 0.244 (older wasm-tools suite)
    { name = "wasmparser", version = "0.244" },
    { name = "wasm-encoder", version = "0.244" },
    { name = "wasm-metadata", version = "0.244" },
    { name = "wit-component", version = "0.244" },
    { name = "wit-parser", version = "0.244" },
    # wasm-compose 0.248 (wasmtime dep) uses wasm-tools 0.248, but its `wat` dep
    # pulls in wasm-tools 0.249 — canonical is 0.249, 0.248 are skipped
    { name = "wasmparser", version = "0.248" },
    { name = "wasm-encoder", version = "0.248" },
    { name = "wit-parser", version = "0.248" },
    # oci-spec (via oci-client) requires strum 0.27 and darling 0.20
    { name = "strum", version = "0.27" },
    { name = "strum_macros", version = "0.27" },
    { name = "darling", version = "0.20" },
    { name = "darling_core", version = "0.20" },
    { name = "darling_macro", version = "0.20" },
    # tokio-postgres (via postgres-protocol) requires fallible-iterator 0.2
    { name = "fallible-iterator", version = "0.2" },
    # tokio-postgres-rustls 0.13 (latest) requires x509-cert 0.2 which uses const-oid 0.9;
    # postgres-protocol uses digest 0.11 which requires const-oid 0.10
    { name = "const-oid", version = "0.9" },
]

# https://embarkstudios.github.io/cargo-deny/checks/advisories/cfg.html
[advisories]
ignore = [
    # paste is unmaintained; also pulled in by utoipa-axum so unavoidable
    { id = "RUSTSEC-2024-0436" },
]
