api.listening_addr = "127.0.0.1:5005"
webui.listening_addr = "127.0.0.1:8080"

[log.file]
enabled = true
target = true
directory = "."
prefix = "obelisk.log" # File name prefix

[[http_server]]
name = "external_webhook"
listening_addr = "127.0.0.1:9090"

[[activity_js]]
name = "test_add_activity"
location = "${OBELISK_TOML_DIR}/crates/testing/test-programs/js/activity/add.js"
ffqn = "testing:integration/activities.add"
params.inline = [
  { name = "a", type = "u32" },
  { name = "b", type = "u32" },
]
max_retries = 0

[[activity_js]]
name = "activity_js_fetch_get"
location = "${OBELISK_TOML_DIR}/crates/testing/test-programs/js/activity/fetch_get.js"
ffqn = "testing:js/activity.fetch-get"
params.inline = [
    {name = "url", type = "string"},
    {name = "headers", type = "list<tuple<string,string>>"},
]
max_retries = 0
[[activity_js.allowed_host]]
pattern = "http://localhost:5005"
methods = ["GET"]

[[workflow_js]]
name = "workflow_js_test"
location = "${OBELISK_TOML_DIR}/crates/testing/test-programs/js/workflow/fetch_components.js"
ffqn = "testing:js/workflow.fetch-components"
params.inline = []

[[webhook_endpoint_js]]
name = "webhook_js_hello"
location = "${OBELISK_TOML_DIR}/crates/testing/test-programs/js/webhook/hello.js"
http_server = "external_webhook"
routes = [{ methods = ["GET"], route = "/hello" }]

[[webhook_endpoint_js]]
name = "webhook_js_fetch_components"
location = "${OBELISK_TOML_DIR}/crates/testing/test-programs/js/webhook/fetch_components.js"
http_server = "external_webhook"
routes = [{ methods = ["GET"], route = "/fetch" }]
[[webhook_endpoint_js.allowed_host]]
pattern = "http://localhost:5005"
methods = ["GET"]

[[webhook_endpoint_js]]
name = "webhook_js_call_activity"
location = "${OBELISK_TOML_DIR}/crates/testing/test-programs/js/webhook/call_activity.js"
http_server = "external_webhook"
routes = [{ methods = ["GET"], route = "/call-activity/:a/:b" }]
