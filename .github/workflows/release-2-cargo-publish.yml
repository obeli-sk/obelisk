name: release-2-cargo-publish

permissions:
  contents: write
  id-token: write
  attestations: write

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "The ref (branch or SHA) to process"
        required: false
        type: string
        default: "latest"
      extra-args:
        description: "Extra args to be used with cargo publish e.g. --no-verify"
        type: string
        required: false
        default: ""
      skip_latest:
        description: "skip_latest: Tag latest will be pushed to Docker Hub unless skip_latest=true"
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      ref:
        description: "The ref (branch or SHA) to process"
        required: false
        type: string
        default: "latest"
      extra-args:
        description: "Extra args to be used with cargo publish e.g. --no-verify"
        type: string
        required: false
        default: ""
      skip_latest:
        description: "skip_latest: Tag latest will be pushed unless skip_latest=true"
        required: true
        type: boolean

defaults:
  run:
    shell: bash -xe {0}

jobs:
  cache-default:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ inputs.ref }}

      - uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable Cachix push
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71
        with:
          name: ${{ vars.CACHIX_CACHE_NAME || 'obeli-sk' }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build default Nix package
        run: nix build .#default

  cargo-publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ inputs.ref }} # Use the ref if provided, otherwise defaults to the current branch/commit
          fetch-depth: 0

      - uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git before push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run cargo publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
        run: |
          nix develop --command cargo publish --workspace --locked ${{ inputs.extra-args }}

  call_child:
    needs:
      - cache-default
      - cargo-publish
    if: ${{ !contains(inputs.extra-args, '--dry-run') }}
    uses: ./.github/workflows/release-3-create-github-release.yml
    secrets: inherit
    with:
      ref: ${{ inputs.ref }}
      skip_latest: ${{ inputs.skip_latest }}
