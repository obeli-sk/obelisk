# TODO: Use flakes to generate the docker image

name: release-4-push-docker-image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "The ref (branch or SHA) to process"
        required: false
        type: string
        default: "latest"
      skip_latest:
        description: "skip_latest: Tag latest will be pushed to Docker Hub unless skip_latest=true"
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      ref:
        description: "The ref (branch or SHA) to process"
        required: false
        type: string
        default: "latest"
      skip_latest:
        description: "skip_latest: Tag latest will be pushed to Docker Hub unless skip_latest=true"
        required: true
        type: boolean
        default: false

defaults:
  run:
    shell: bash -xe {0}

jobs:
  push-image:
    name: ${{ matrix.dockerfile }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - tarfile: obelisk-x86_64-unknown-linux-gnu.tar.gz
            dockerfile: ubuntu-24.04.Dockerfile
            image_tag: ubuntu

          - tarfile: obelisk-x86_64-unknown-linux-gnu.tar.gz
            dockerfile: ubuntu-24.04-litestream.Dockerfile
            image_tag: ubuntu-litestream

          - tarfile: obelisk-x86_64-unknown-linux-musl.tar.gz
            dockerfile: alpine.Dockerfile
            image_tag: alpine

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.ref }}

      - id: git-info
        run: |
          VERSION="$(grep -m1 '^version = "' Cargo.toml | cut -d'"' -f2)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Download and extract binary
        run: |
          mkdir tmp
          cd tmp
          wget -q https://github.com/obeli-sk/obelisk/releases/download/${TAG}/${{ matrix.tarfile }}
          tar xvfz ${{ matrix.tarfile }}
        env:
          TAG: ${{ steps.git-info.outputs.tag }}

      - name: Build and push docker image
        run: |
          docker login -u getobelisk -p ${{ secrets.DOCKER_HUB_TOKEN }}
          IMAGE_BASE="getobelisk/obelisk"
          TAGS=(
            "${IMAGE_BASE}:${{ matrix.image_tag }}"
            "${IMAGE_BASE}:${VERSION}-${{ matrix.image_tag }}"
          )
          if [ "${{ inputs.skip_latest }}" != "true" ] && [ "${{ matrix.image_tag }}" = "ubuntu" ]; then
            TAGS+=("${IMAGE_BASE}:latest")
          fi
          PUSH=true scripts/build-docker-image.sh \
            tmp/obelisk \
            .github/workflows/release/docker-image/server.toml \
            .github/workflows/release/docker-image/${{ matrix.dockerfile }} \
            "${TAGS[@]}"
        env:
          VERSION: ${{ steps.git-info.outputs.version }}

  verify-github-release:
    needs: push-image
    uses: ./.github/workflows/release-5-verify-github-release.yml
    secrets: inherit
    with:
      ref: ${{ inputs.ref }}

  verify-download-sh:
    needs: push-image
    uses: ./.github/workflows/release-5-verify-download-sh.yml
    secrets: inherit
    with:
      ref: ${{ inputs.ref }}

  verify-run-nix:
    needs: push-image
    uses: ./.github/workflows/release-5-verify-run-nix.yml
    secrets: inherit
    with:
      ref: ${{ inputs.ref }}

  verify-cargo-install:
    needs: push-image
    uses: ./.github/workflows/release-5-verify-cargo-install.yml
    secrets: inherit
    with:
      ref: ${{ inputs.ref }}

  verify-cargo-binstall:
    needs: push-image
    uses: ./.github/workflows/release-5-verify-cargo-binstall.yml
    secrets: inherit
    with:
      ref: ${{ inputs.ref }}

  verify-docker:
    needs: push-image
    uses: ./.github/workflows/release-5-verify-docker.yml
    secrets: inherit
    with:
      ref: ${{ inputs.ref }}
