name: release-5-verify-cargo-binstall

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "The ref (branch or SHA) to obtain the tag"
        required: false
        type: string
        default: "latest"
  workflow_call:
    inputs:
      ref:
        description: "The ref (branch or SHA) to obtain the tag"
        required: false
        type: string
        default: "latest"

defaults:
  run:
    shell: bash -xe {0}

jobs:
  verify-cargo-binstall:
    name: verify-cargo-binstall-${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
          - runner: macos-14
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ inputs.ref }}

      - id: git-info
        run: |
          VERSION="$(grep -m1 '^version = "' Cargo.toml | cut -d'"' -f2)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Download cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Run cargo binstall
        run: |
          cargo binstall \
            --github-token ${{ secrets.GITHUB_TOKEN }} \
            --strategies "crate-meta-data,quick-install" \
            -y \
            obelisk@$VERSION
        env:
          VERSION: ${{ steps.git-info.outputs.version }}

      - name: Verify Obelisk
        env:
          VERSION: ${{ steps.git-info.outputs.version }}
        run: |
          obelisk --version | grep "$VERSION"
          obelisk server verify --deployment obelisk-testing-wasm-oci.toml

  cargo-binstall-alpine:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ inputs.ref }}

      - id: git-info
        run: |
          VERSION="$(grep -m1 '^version = "' Cargo.toml | cut -d'"' -f2)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - run: |
          docker build --progress=plain --build-arg VERSION=$VERSION -f - . <<EOF
            FROM alpine:latest
            ARG VERSION
            WORKDIR /root
            COPY obelisk-testing-wasm-oci.toml .
            RUN wget https://github.com/cargo-bins/cargo-binstall/releases/latest/download/cargo-binstall-x86_64-unknown-linux-musl.tgz \
            && tar xvfz cargo-binstall-x86_64-unknown-linux-musl.tgz
            RUN ./cargo-binstall \
              --strategies "crate-meta-data,quick-install" \
              --install-path . \
              -y \
              obelisk@$VERSION
            RUN ./obelisk --version | grep $VERSION
            RUN ./obelisk server verify --deployment obelisk-testing-wasm-oci.toml
          EOF
        env:
          TAG: ${{ steps.git-info.outputs.tag }}
          VERSION: ${{ steps.git-info.outputs.version }}
