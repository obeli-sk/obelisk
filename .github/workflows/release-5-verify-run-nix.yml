name: release-5-verify-run-nix

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "The ref (branch or SHA) to obtain the tag"
        required: false
        type: string
        default: "latest"
  workflow_call:
    inputs:
      ref:
        description: "The ref (branch or SHA) to obtain the tag"
        required: false
        type: string
        default: "latest"

defaults:
  run:
    shell: bash -xe {0}

jobs:
  check-run-nix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: default
            os: ubuntu-24.04
          - target: default
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.ref }}

      - id: git-info
        run: |
          VERSION="$(grep -m1 '^version = "' Cargo.toml | cut -d'"' -f2)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Populate the nix store without Obelisk # pull base deps from cache.nixos.org first
        run: |
          nix develop --command echo
      - name: Add cachix cache
        run: |
          echo "extra-substituters = https://obeli-sk.cachix.org" >> ~/.config/nix/nix.conf
          echo "extra-trusted-public-keys = obeli-sk.cachix.org-1:31iM9GWSEhAXvvuTWQ7CvAcwvgRzsuJ9yJghywSd3Jw=" >> ~/.config/nix/nix.conf

      - name: Create temp directory
        run: mkdir temp

      - name: nix nun obelisk
        working-directory: temp
        run: |
          full_target="github:obeli-sk/obelisk/${TAG}#${{ matrix.target }}"
          nix run $full_target -- --version | grep "$VERSION"
          nix run $full_target -- server verify --deployment ../obelisk-testing-wasm-oci.toml
        env:
          TAG: ${{ steps.git-info.outputs.tag }}
          VERSION: ${{ steps.git-info.outputs.version }}
