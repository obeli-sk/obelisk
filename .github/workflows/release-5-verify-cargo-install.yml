name: release-5-verify-cargo-install

# Contrary to `check-run-cargo-install`, install latest Rust and run cargo install using sources from crates.io .

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "The ref (branch or SHA) to obtain the tag"
        required: false
        type: string
        default: "latest"
  workflow_call:
    inputs:
      ref:
        description: "The ref (branch or SHA) to obtain the tag"
        required: false
        type: string
        default: "latest"

defaults:
  run:
    shell: bash -xe {0}

jobs:
  verify-assets:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ inputs.ref }}

      - id: git-info
        run: |
          VERSION="$(grep -m1 '^version = "' Cargo.toml | cut -d'"' -f2)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Install latest Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install protobuf-compiler -y

      - name: Run cargo install
        run: |
          source "$HOME/.cargo/env"
          cargo install obelisk@$VERSION --locked
        env:
          VERSION: ${{ steps.git-info.outputs.version }}

      - name: Verify Obelisk
        env:
          VERSION: ${{ steps.git-info.outputs.version }}
        run: |
          source "$HOME/.cargo/env"
          obelisk --version | grep "$VERSION"
          obelisk server verify --deployment obelisk-testing-wasm-oci.toml
